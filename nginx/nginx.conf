# Nginx 配置：托管前端静态文件 + 反向代理后端 API
server {
    listen 80;
    server_name _;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 单页应用路由：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长期缓存（文件名带 hash，改了会自动失效）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 反向代理后端 API 到 backend 容器的 8000 端口
    # "backend" 是 docker-compose 里后端服务的名字，Docker 内部 DNS 会解析
    location ~ ^/(auth|leaderboard|progress|challenges|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 头像等用户上传文件（反向代理到后端 StaticFiles）
    # 7 天缓存 + immutable，文件名固定为 {user_id}.png，更新时前端用 ?v= 击穿缓存
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 上传体积限制（云存档可能略大）
    client_max_body_size 10M;
}
